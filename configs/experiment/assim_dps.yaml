# @package _global_
# Assimilation par Diffusion Posterior Sampling — conditionne la diffusion sur y.
defaults:
  - override /dataloader: era5_arco_bog

experiment_name: assim_dps
tags: ["assim", "dps", "score-based"]

assim:
