# Streaming ARCO-ERA5 (Google Cloud Storage), cropé sur le Golfe de Gascogne.
_target_: wxrouting.data.era5_arco.Era5ArcoDataModule

# Bucket public ARCO-ERA5 — résolution 0.25°, pas 1h.
zarr_url: "gs://gcp-public-data-arco-era5/ar/full_37-1h-0p25deg-chunk-1.zarr-v3"
storage_options:
  token: anon            # accès anonyme, pas besoin de creds GCP

# Variables alignées sur le state vector ArchesWeatherGen.
variables:
  surface: ["10m_u_component_of_wind", "10m_v_component_of_wind",
            "2m_temperature", "mean_sea_level_pressure"]
  level:   ["geopotential", "temperature",
            "u_component_of_wind", "v_component_of_wind", "specific_humidity"]
  pressure_levels: [50, 100, 150, 200, 250, 300, 400, 500, 600, 700, 850, 925, 1000]

# Fenêtre temporelle (UTC).
train_period: ["1979-01-01", "2020-12-31"]
val_period:   ["2021-01-01", "2022-12-31"]
test_period:  ["2023-01-01", "2024-12-31"]

# Échantillonnage : (x_t, x_{t+lead}) pour la prédiction.
lead_time_hours: 6
sample_stride_hours: 6     # tous les pas de temps

batch_size: 4
num_workers: ${cluster.num_workers}
