# Racine Hydra — composition par défaut.
# Override en ligne : `wxr-train experiment=finetune_bog cluster=slurm`

defaults:
  - _self_
  - cluster: local
  - dataloader: era5_arco_bog
  - module: archesweathergen_finetune
  - fetchers: synthetic_only   # preset par défaut (sans clé API)
  - route: default             # [PoC routage] paramètres de routage
  - experiment: null           # un experiment écrase au besoin

# Domaine régional — Golfe de Gascogne
domain:
  name: bay_of_biscay
  lat_min: 43.0
  lat_max: 48.0
  lon_min: -10.0
  lon_max: -1.0
  # padding (en pixels grille) pour conserver le champ réceptif du transformer
  pad_pixels: 8

# Fenêtre d'assimilation par défaut (UTC ISO 8601) — un experiment la surcharge.
window:
  t0: "2024-06-01T00:00:00Z"
  t1: "2024-06-02T00:00:00Z"

seed: 1337
output_dir: ${hydra:runtime.output_dir}

# Reprise d'entraînement : chemin d'un checkpoint (.ckpt) ou null.
resume: null

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
