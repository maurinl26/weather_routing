# Preset : toutes les sources ouvertes — démo "DA d'opportunité maximale".
# Mélange obs satellite + bouées + navires marchands + voiliers virtuels.
defaults:
  - source@cmems: cmems
  - source@ascat: ascat
  - source@vos: vos
  - source@synthetic: synthetic
  - _self_

# Plus de voiliers virtuels que le preset TP pour densifier la démo.
synthetic:
  n_vessels: 30
