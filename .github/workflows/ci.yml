name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies (no geoarches in CI)
        # geoarches tire torch GPU + Hydra-bundled CUDA libs : trop lourd pour
        # une CI GitHub-hosted. On l'exclut côté CI — les tests qui en dépendent
        # sont marqués comme requérant ce paquet (skip si absent).
        run: |
          uv venv
          uv pip install -e ".[dev]" \
            --no-deps  # on ne tire que les deps minimales
          uv pip install torch lightning hydra-core omegaconf \
            xarray zarr pandas numpy scipy pytest ruff

      - name: Ruff
        run: uv run ruff check src tests

      - name: Pytest
        run: uv run pytest -q
